<div class="main-container d-flex">
    <app-sidebar></app-sidebar>
    <div class="content-wrapper" style="overflow-y: auto;">
        <div class="register-page">
            <div class="register-form-card">
                <h3>Registrate como Paciente</h3>
                <app-register-paciente @fade [isCaptchaValidated]="captchaValidated"></app-register-paciente>
                <app-captcha 
                    *ngIf="captchaEnabled" 
                    (captchaValidated)="onCaptchaValidated($event)">
                </app-captcha>
                <div *ngIf="!captchaEnabled" class="alert alert-info text-center mt-3">
                    <i class="bi bi-info-circle"></i> El captcha está desactivado
                </div>
            </div>
        </div>
    </div>
</div>
