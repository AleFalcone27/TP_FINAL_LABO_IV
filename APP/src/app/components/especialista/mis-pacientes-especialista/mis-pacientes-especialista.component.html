<app-spinner [isLoading]="isLoading" [message]="loadingMessage"></app-spinner>

<div class="main-container d-flex">
  <app-sidebar></app-sidebar>
  <div @routeAnimations class="content-wrapper d-flex flex-column align-items-center p-4 flex-grow-1">
    <h2 class="page-title">Mis Pacientes</h2>

    <input
      type="text"
      class="form-control table-search"
      placeholder="Buscar por nombre o fecha..."
      (input)="onSearch($event)"
      [(ngModel)]="searchTerm">

    <div class="data-table-wrapper">
      <table class="data-table" *ngIf="!isLoading && filteredPatients.length > 0">
        <thead>
          <tr>
            <th class="text-left">Nombre</th>
            <th class="text-left">Apellido</th>
            <th>Último turno</th>
            <th>Turnos</th>
            <th class="action-column">Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let patient of filteredPatients">
            <td class="text-left">{{ patient.patientFirstName }}</td>
            <td class="text-left">{{ patient.patientLastName }}</td>
            <td>{{ formatDate(patient.lastAppointmentDate) }}</td>
            <td>{{ patient.appointmentsCount }}</td>
            <td class="action-column">
              <button class="btn-action info" (click)="downloadMedicalHistoryPdf(patient)" [disabled]="isGeneratingPdf">
                Ver historia clínica
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="empty-state" *ngIf="!isLoading && filteredPatients.length === 0">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <p>No se encontraron pacientes vinculados a tus turnos.</p>
    </div>
  </div>
</div>
